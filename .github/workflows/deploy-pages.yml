name: Deploy site (production + staging)

# Publishes BOTH environments into one GitHub Pages artifact:
#   - production  (from `main`)    → https://letspilatesla.com/
#   - staging     (from `Staging`) → https://letspilatesla.com/staging/
# Triggered by pushes to either branch, so:
#   push to Staging → /staging updates (production untouched)
#   merge to main   → production updates
on:
  push:
    branches: [main, Staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; a newer run supersedes an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- Production (main) → site root ----------
      - name: Checkout main (production)
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod
      - name: Build production
        working-directory: prod/pilates-landing
        run: |
          npm ci
          npm run build
      - name: Assemble production at root
        run: |
          mkdir -p _site
          cp -r prod/pilates-landing/dist/. _site/

      # ---------- Staging (Staging branch) → /staging ----------
      - name: Checkout Staging
        uses: actions/checkout@v4
        with:
          ref: Staging
          path: stg
      - name: Build staging (base=/staging/)
        working-directory: stg/pilates-landing
        run: |
          npm ci
          npm run build -- --base=/staging/
      - name: Assemble staging under /staging
        run: |
          mkdir -p _site/staging
          cp -r stg/pilates-landing/dist/. _site/staging/
          rm -f _site/staging/CNAME   # keep a single CNAME at the root only

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
